<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplashWash - Cuci Mobil & Motor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;color:#1a1a1a}
        .header{background:#1565c0;color:#fff;padding:14px 24px;font-size:17px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.15)}
        .wrap{max-width:880px;margin:20px auto;padding:0 16px}
        .card{background:#fff;border-radius:10px;padding:20px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .card h2{font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #eee}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
        input,select{width:100%;padding:9px 11px;border:1.5px solid #ddd;border-radius:7px;font-size:14px;background:#fafafa}
        input:focus,select:focus{outline:none;border-color:#1565c0;background:#fff}
        input[readonly]{background:#eee;color:#666}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer}
        .btn:active{transform:scale(.97)}
        .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-biru{background:#1565c0;color:#fff}
        .btn-biru:hover:not(:disabled){background:#0d47a1}
        .btn-hijau{background:#2e7d32;color:#fff;padding:5px 12px;font-size:12px}
        .btn-hijau:hover{background:#1b5e20}
        .btn-merah{background:#c62828;color:#fff;padding:5px 12px;font-size:12px}
        .btn-merah:hover{background:#b71c1c}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:9px 8px;font-size:11px;font-weight:700;color:#777;text-transform:uppercase;background:#f8f8f8;border-bottom:2px solid #eee}
        td{padding:9px 8px;font-size:13px;border-bottom:1px solid #f0f0f0}
        tr:hover{background:#f8f9ff}
        .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
        .b-proses{background:#fff8e1;color:#f57f17}
        .b-selesai{background:#e8f5e9;color:#2e7d32}
        .aksi{display:flex;gap:5px}
        .kosong{text-align:center;padding:28px;color:#aaa;font-size:13px}
        .toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
        .toast.show{transform:translateY(0);opacity:1}
        .t-ok{background:#2e7d32}
        .t-err{background:#c62828}
        @media(max-width:600px){
            .grid2,.grid3{grid-template-columns:1fr}
            .hide-sm{display:none}
            .aksi{flex-direction:column}
        }
    </style>
</head>
<body>

<div class="header">SplashWash - Cuci Mobil & Motor</div>

<div class="wrap">

    <!-- FORM -->
    <div class="card">
        <h2>Pesanan Cuci Baru</h2>
        <form id="frmPesan" onsubmit="return kirimPesanan(event)">
            <div class="grid3">
                <div>
                    <label>Nama Customer</label>
                    <input type="text" id="iNama" placeholder="Nama kamu" required>
                </div>
                <div>
                    <label>Jenis Kendaraan</label>
                    <select id="iJenis" required>
                        <option value="">-- Pilih Jenis --</option>
                        <option value="Motor">Motor</option>
                        <option value="Mobil">Mobil</option>
                        <option value="Truk / Pick Up">Truk / Pick Up</option>
                    </select>
                </div>
                <div>
                    <label>Plat Nomor</label>
                    <input type="text" id="iPlat" placeholder="B 1234 ABC" required>
                </div>
            </div>
            <div class="grid2" style="margin-top:12px">
                <div>
                    <label>Pilih Layanan</label>
                    <select id="iLayanan" required>
                        <option value="">-- Pilih jenis kendaraan dulu --</option>
                    </select>
                </div>
                <div>
                    <label>Harga</label>
                    <input type="text" id="iHarga" readonly placeholder="Otomatis terisi">
                </div>
            </div>
            <div style="margin-top:14px">
                <button type="submit" class="btn btn-biru" id="btnKirim">Pesan Sekarang</button>
            </div>
        </form>
    </div>

    <!-- DAFTAR KENDARAAN -->
    <div class="card">
        <h2>Daftar Jenis Kendaraan</h2>
        <table>
            <thead><tr><th>ID</th><th>Jenis Kendaraan</th></tr></thead>
            <tbody>
                <tr><td>1</td><td>Motor</td></tr>
                <tr><td>2</td><td>Mobil</td></tr>
                <tr><td>3</td><td>Truk / Pick Up</td></tr>
            </tbody>
        </table>
    </div>

    <!-- DAFTAR LAYANAN -->
    <div class="card">
        <h2>Daftar Layanan & Harga</h2>
        <table>
            <thead><tr><th>ID</th><th>Nama Layanan</th><th>Jenis</th><th>Harga</th><th class="hide-sm">Durasi</th></tr></thead>
            <tbody id="tbLayanan"></tbody>
        </table>
    </div>

    <!-- RIWAYAT PESANAN -->
    <div class="card">
        <h2 style="display:flex;justify-content:space-between;align-items:center">
            Riwayat Pesanan
            <button type="button" class="btn btn-biru" style="padding:5px 14px;font-size:12px" onclick="muatPesanan()">Refresh</button>
        </h2>
        <table>
            <thead><tr><th>ID</th><th>Customer</th><th class="hide-sm">Plat</th><th>Layanan</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="tbPesanan"><tr><td colspan="7" class="kosong">Memuat...</td></tr></tbody>
        </table>
    </div>

</div>

<div id="toast" class="toast"></div>

<script>
var API = 'api.php';

// DATA LAYANAN LANGSUNG DI SINI BIAR GAK KOSONG
var dataLayanan = [
    {id: 1, nama: 'Cuci Kilat',        jenis: 'Motor',         harga: 15000,  durasi_menit: 15},
    {id: 2, nama: 'Cuci Kilat',        jenis: 'Mobil',         harga: 35000,  durasi_menit: 30},
    {id: 3, nama: 'Cuci Kilat',        jenis: 'Truk / Pick Up',harga: 75000,  durasi_menit: 45},
    {id: 4, nama: 'Cuci Detail',       jenis: 'Motor',         harga: 30000,  durasi_menit: 30},
    {id: 5, nama: 'Cuci Detail',       jenis: 'Mobil',         harga: 85000,  durasi_menit: 90},
    {id: 6, nama: 'Cuci Detail',       jenis: 'Truk / Pick Up',harga: 120000, durasi_menit: 120},
    {id: 7, nama: 'Waxing',            jenis: 'Motor',         harga: 50000,  durasi_menit: 45},
    {id: 8, nama: 'Waxing',            jenis: 'Mobil',         harga: 150000, durasi_menit: 120}
];

function rp(n) { return 'Rp' + Number(n).toLocaleString('id-ID'); }

function toast(m, ok) {
    var t = document.getElementById('toast');
    t.textContent = m;
    t.className = 'toast ' + (ok !== false ? 't-ok' : 't-err') + ' show';
    clearTimeout(t._tm);
    t._tm = setTimeout(function() { t.className = 'toast'; }, 3000);
}

function ajax(get, post, cb) {
    var xhr = new XMLHttpRequest();
    if (post) {
        xhr.open('POST', API + '?' + get, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    } else {
        xhr.open('GET', API + '?' + get, true);
    }
    xhr.onload = function() {
        if (xhr.status === 200) {
            try { cb(JSON.parse(xhr.responseText)); }
            catch(e) { cb({success:false, message:'Parse error'}); }
        } else {
            cb({success:false, message:'HTTP Error ' + xhr.status});
        }
    };
    xhr.onerror = function() { cb({success:false, message:'Gagal hubungi server'}); };
    if (post) { xhr.send(post); } else { xhr.send(); }
}

// ===== RENDER TABEL LAYANAN DARI DATA DI ATAS =====
function renderTabelLayanan() {
    var html = '';
    for (var i = 0; i < dataLayanan.length; i++) {
        var l = dataLayanan[i];
        html += '<tr><td>' + l.id + '</td><td>' + l.nama + '</td><td>' + l.jenis + '</td><td>' + rp(l.harga) + '</td><td class="hide-sm">' + l.durasi_menit + ' menit</td></tr>';
    }
    document.getElementById('tbLayanan').innerHTML = html;
}

// ===== FILTER LAYANAN PAS JENIS DIGANTI =====
document.getElementById('iJenis').addEventListener('change', function() {
    var jenis = this.value;
    var sel = document.getElementById('iLayanan');
    sel.innerHTML = '<option value="">-- Pilih Layanan --</option>';
    document.getElementById('iHarga').value = '';

    if (!jenis) return;

    for (var i = 0; i < dataLayanan.length; i++) {
        var l = dataLayanan[i];
        if (l.jenis === jenis) {
            sel.innerHTML += '<option value="' + l.id + '" data-harga="' + l.harga + '">' + l.nama + ' - ' + rp(l.harga) + '</option>';
        }
    }
});

// ===== TAMPILKAN HARGA PAS LAYANAN DIGANTI =====
document.getElementById('iLayanan').addEventListener('change', function() {
    var opt = this.options[this.selectedIndex];
    var h = opt.getAttribute('data-harga');
    document.getElementById('iHarga').value = h ? rp(h) : '';
});

// ===== LOAD PESANAN DARI DATABASE =====
function muatPesanan() {
    ajax('action=get_pesanan', null, function(r) {
        if (!r.success) { toast(r.message, false); return; }
        var d = r.data;
        if (!d.length) {
            document.getElementById('tbPesanan').innerHTML = '<tr><td colspan="7" class="kosong">Belum ada pesanan</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < d.length; i++) {
            var p = d[i];
            var badge = p.status === 'PROSES' ? '<span class="badge b-proses">PROSES</span>' : '<span class="badge b-selesai">SELESAI</span>';
            var aksi = '';
            if (p.status === 'PROSES') {
                aksi = '<div class="aksi"><button class="btn btn-hijau" onclick="selesaikan(' + p.id + ')">Selesai</button><button class="btn btn-merah" onclick="hapusPesanan(' + p.id + ')">Hapus</button></div>';
            } else {
                aksi = '<span style="color:#aaa;font-size:12px">-</span>';
            }
            html += '<tr><td>' + p.id + '</td><td><b>' + p.nama_customer + '</b></td><td class="hide-sm">' + p.plat_nomor + '</td><td>' + p.layanan_nama + ' (' + p.jenis + ')</td><td>' + rp(p.total_bayar) + '</td><td>' + badge + '</td><td>' + aksi + '</td></tr>';
        }
        document.getElementById('tbPesanan').innerHTML = html;
    });
}

// ===== KIRIM PESANAN =====
function kirimPesanan(e) {
    e.preventDefault();
    var nama = document.getElementById('iNama').value.trim();
    var plat = document.getElementById('iPlat').value.trim();
    var layananId = document.getElementById('iLayanan').value;

    if (!nama || !plat || !layananId) {
        toast('Isi semua field', false);
        return false;
    }

    var btn = document.getElementById('btnKirim');
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    ajax('action=buat_pesanan', 'layanan_id=' + layananId + '&nama_customer=' + encodeURIComponent(nama) + '&plat_nomor=' + encodeURIComponent(plat), function(r) {
        btn.disabled = false;
        btn.textContent = 'Pesan Sekarang';
        if (r.success) {
            toast('Pesanan berhasil!');
            document.getElementById('frmPesan').reset();
            document.getElementById('iHarga').value = '';
            document.getElementById('iLayanan').innerHTML = '<option value="">-- Pilih jenis kendaraan dulu --</option>';
            muatPesanan();
        } else {
            toast(r.message, false);
        }
    });
    return false;
}

// ===== SELESAIKAN =====
function selesaikan(id) {
    ajax('action=selesaikan', 'id=' + id, function(r) {
        if (r.success) { toast('Selesai!'); muatPesanan(); }
        else { toast(r.message, false); }
    });
}

// ===== HAPUS =====
function hapusPesanan(id) {
    if (!confirm('Hapus pesanan ini?')) return;
    ajax('action=hapus', 'id=' + id, function(r) {
        if (r.success) { toast('Dihapus'); muatPesanan(); }
        else { toast(r.message, false); }
    });
}

// ===== INIT =====
renderTabelLayanan();
muatPesanan();
</script>
</body>
</html>
